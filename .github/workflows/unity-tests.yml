name: Unity Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Assets/NowUI/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/scripts/Run-UnityTests.ps1'
      - '.github/workflows/unity-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'Assets/NowUI/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
      - '.github/scripts/Run-UnityTests.ps1'
      - '.github/workflows/unity-tests.yml'

jobs:
  unity-tests:
    name: ${{ matrix.testPlatform }}
    runs-on:
      - self-hosted
      - Windows
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        testPlatform:
          - EditMode
          - PlayMode
    env:
      UNITY_EDITOR: 'C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate native plugin import settings
        shell: pwsh
        run: |
          $pluginBinaries = Get-ChildItem -Path Assets\NowUI\Plugins -Recurse -File |
            Where-Object { $_.Name -match '\.(dll|dylib|so|a|bc)$' }

          $missingMetas = $pluginBinaries |
            Where-Object { -not (Test-Path -LiteralPath "$($_.FullName).meta") }

          if ($missingMetas) {
            Write-Host "Native plugin files missing Unity meta files:"
            $missingMetas | ForEach-Object { Write-Host " - $($_.FullName)" }
            exit 1
          }

          $pluginMetas = $pluginBinaries |
            ForEach-Object { Get-Item -LiteralPath "$($_.FullName).meta" }

          $missingImporters = $pluginMetas |
            Where-Object { -not (Select-String -LiteralPath $_.FullName -Pattern 'PluginImporter:' -Quiet) }

          if ($missingImporters) {
            Write-Host "Native plugin meta files missing PluginImporter settings:"
            $missingImporters | ForEach-Object { Write-Host " - $($_.FullName)" }
            exit 1
          }

      - name: Run Unity tests
        shell: pwsh
        run: >
          .\.github\scripts\Run-UnityTests.ps1
          -UnityEditor "${env:UNITY_EDITOR}"
          -ProjectPath "${env:GITHUB_WORKSPACE}"
          -TestPlatform "${{ matrix.testPlatform }}"
          -ArtifactsPath "${env:GITHUB_WORKSPACE}\artifacts\${{ matrix.testPlatform }}"
          -CleanScriptAssemblies

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ matrix.testPlatform }}-artifacts
          path: artifacts/${{ matrix.testPlatform }}
