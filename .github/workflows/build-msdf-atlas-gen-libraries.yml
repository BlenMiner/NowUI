name: Build MSDF Atlas Gen Libraries

"on":
  workflow_dispatch:
    inputs:
      msdf_atlas_gen_ref:
        description: "msdf-atlas-gen git ref to build"
        required: true
        default: "v1.4"
      emscripten_ref:
        description: "Emscripten SDK version for Unity 2023.2+/Unity 6 WebGL plugin artifacts"
        required: true
        default: "3.1.38"

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_name: windows-x64
            vcpkg_triplet: x64-windows-static-md
            plugin_path: Windows/x86_64
          - os: ubuntu-latest
            artifact_name: linux-x64
            vcpkg_triplet: x64-linux
            plugin_path: Linux/x86_64
          - os: macos-15-intel
            artifact_name: macos-x64
            vcpkg_triplet: x64-osx
            plugin_path: macOS/x86_64
          - os: macos-15
            artifact_name: macos-arm64
            vcpkg_triplet: arm64-osx
            plugin_path: macOS/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set build paths
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$(Join-Path $env:RUNNER_TEMP "vcpkg")"
          Add-Content -Path $env:GITHUB_ENV -Value "MSDF_ATLAS_GEN_SOURCE=$(Join-Path $env:RUNNER_TEMP "msdf-atlas-gen")"
          Add-Content -Path $env:GITHUB_ENV -Value "BUILD_DIR=$(Join-Path $env:RUNNER_TEMP "msdf-atlas-gen-build")"
          Add-Content -Path $env:GITHUB_ENV -Value "INSTALL_DIR=$(Join-Path $env:GITHUB_WORKSPACE "artifacts/msdf-atlas-gen-${{ matrix.artifact_name }}")"
          Add-Content -Path $env:GITHUB_ENV -Value "NOWUI_MSDF_BUILD_DIR=$(Join-Path $env:RUNNER_TEMP "nowui-msdf-build")"
          Add-Content -Path $env:GITHUB_ENV -Value "NOWUI_MSDF_INSTALL_DIR=$(Join-Path $env:GITHUB_WORKSPACE "artifacts/nowui-msdf-${{ matrix.artifact_name }}")"
          Add-Content -Path $env:GITHUB_ENV -Value "NOWUI_MSDF_PLUGIN_DIR=$(Join-Path $env:GITHUB_WORKSPACE "artifacts/nowui-msdf-${{ matrix.artifact_name }}/Assets/NowUI/Plugins/${{ matrix.plugin_path }}")"

      - name: Checkout msdf-atlas-gen
        shell: pwsh
        run: |
          git clone --recursive --branch "${{ inputs.msdf_atlas_gen_ref }}" https://github.com/Chlumsky/msdf-atlas-gen.git "$env:MSDF_ATLAS_GEN_SOURCE"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"

          if ($env:RUNNER_OS -eq "Windows") {
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics
          } else {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          }

      - name: Configure
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-S", "$env:MSDF_ATLAS_GEN_SOURCE",
            "-B", "$env:BUILD_DIR",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_INSTALL_PREFIX=$env:INSTALL_DIR",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}",
            "-DBUILD_SHARED_LIBS=ON",
            "-DMSDF_ATLAS_BUILD_STANDALONE=OFF",
            "-DMSDF_ATLAS_INSTALL=ON",
            "-DMSDF_ATLAS_USE_SKIA=OFF",
            "-DMSDF_ATLAS_NO_ARTERY_FONT=ON",
            "-DMSDF_ATLAS_DYNAMIC_RUNTIME=ON"
          )

          if ($env:RUNNER_OS -eq "Windows") {
            $cmakeArgs += @("-G", "Visual Studio 17 2022", "-A", "x64")
          }

          cmake @cmakeArgs

      - name: Build
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release --parallel

      - name: Install
        shell: pwsh
        run: |
          cmake --install "$env:BUILD_DIR" --config Release

      - name: Configure NowUI native wrapper
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-S", "${{ github.workspace }}/Assets/NowUI/Native/nowui-msdf",
            "-B", "$env:NOWUI_MSDF_BUILD_DIR",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_INSTALL_PREFIX=$env:NOWUI_MSDF_INSTALL_DIR",
            "-DCMAKE_PREFIX_PATH=$env:INSTALL_DIR;$env:VCPKG_ROOT/installed/${{ matrix.vcpkg_triplet }}",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}"
          )

          if ($env:RUNNER_OS -eq "Windows") {
            $cmakeArgs += @("-G", "Visual Studio 17 2022", "-A", "x64")
          }

          cmake @cmakeArgs

      - name: Build NowUI native wrapper
        shell: pwsh
        run: |
          cmake --build "$env:NOWUI_MSDF_BUILD_DIR" --config Release --parallel

      - name: Install NowUI native wrapper
        shell: pwsh
        run: |
          cmake --install "$env:NOWUI_MSDF_BUILD_DIR" --config Release
          New-Item -ItemType Directory -Force -Path "$env:NOWUI_MSDF_PLUGIN_DIR" | Out-Null

          if ($env:RUNNER_OS -eq "Windows") {
            Copy-Item -Path "$env:NOWUI_MSDF_INSTALL_DIR/bin/*.dll" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force
            Copy-Item -Path "$env:INSTALL_DIR/bin/*.dll" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force
          } else {
            Copy-Item -Path "$env:NOWUI_MSDF_INSTALL_DIR/lib/*.so*" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force -ErrorAction SilentlyContinue
            Copy-Item -Path "$env:NOWUI_MSDF_INSTALL_DIR/lib/*.dylib" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force -ErrorAction SilentlyContinue
            Copy-Item -Path "$env:INSTALL_DIR/lib/*.so*" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force -ErrorAction SilentlyContinue
            Copy-Item -Path "$env:INSTALL_DIR/lib/*.dylib" -Destination "$env:NOWUI_MSDF_PLUGIN_DIR" -Force -ErrorAction SilentlyContinue
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msdf-atlas-gen-${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/artifacts/msdf-atlas-gen-${{ matrix.artifact_name }}

      - name: Upload NowUI native wrapper artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowui-msdf-${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/artifacts/nowui-msdf-${{ matrix.artifact_name }}

  build-webgl:
    name: webgl-emscripten
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set WebGL build paths
        shell: bash
        run: |
          echo "EMSDK_ROOT=$RUNNER_TEMP/emsdk" >> "$GITHUB_ENV"
          echo "VCPKG_ROOT=$RUNNER_TEMP/vcpkg" >> "$GITHUB_ENV"
          echo "MSDF_ATLAS_GEN_SOURCE=$RUNNER_TEMP/msdf-atlas-gen" >> "$GITHUB_ENV"
          echo "BUILD_DIR=$RUNNER_TEMP/msdf-atlas-gen-webgl-build" >> "$GITHUB_ENV"
          echo "INSTALL_DIR=$GITHUB_WORKSPACE/artifacts/msdf-atlas-gen-webgl" >> "$GITHUB_ENV"
          echo "NOWUI_MSDF_BUILD_DIR=$RUNNER_TEMP/nowui-msdf-webgl-build" >> "$GITHUB_ENV"
          echo "NOWUI_MSDF_INSTALL_DIR=$GITHUB_WORKSPACE/artifacts/nowui-msdf-webgl-install" >> "$GITHUB_ENV"
          echo "NOWUI_MSDF_PLUGIN_DIR=$GITHUB_WORKSPACE/artifacts/nowui-msdf-webgl/Assets/NowUI/Plugins/WebGL" >> "$GITHUB_ENV"

      - name: Checkout msdf-atlas-gen
        shell: bash
        run: |
          git clone --recursive --branch "${{ inputs.msdf_atlas_gen_ref }}" https://github.com/Chlumsky/msdf-atlas-gen.git "$MSDF_ATLAS_GEN_SOURCE"

      - name: Setup Emscripten
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "$EMSDK_ROOT"
          "$EMSDK_ROOT/emsdk" install "${{ inputs.emscripten_ref }}"
          "$EMSDK_ROOT/emsdk" activate "${{ inputs.emscripten_ref }}"

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure msdf-atlas-gen for WebGL
        shell: bash
        run: |
          source "$EMSDK_ROOT/emsdk_env.sh" >/dev/null

          cmake \
            -S "$MSDF_ATLAS_GEN_SOURCE" \
            -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$EMSDK_ROOT/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
            -DVCPKG_TARGET_TRIPLET=wasm32-emscripten \
            -DBUILD_SHARED_LIBS=OFF \
            -DMSDF_ATLAS_BUILD_STANDALONE=OFF \
            -DMSDF_ATLAS_INSTALL=ON \
            -DMSDF_ATLAS_USE_SKIA=OFF \
            -DMSDF_ATLAS_NO_ARTERY_FONT=ON \
            -DMSDF_ATLAS_DYNAMIC_RUNTIME=OFF \
            -DMSDF_ATLAS_NO_PNG=ON \
            -DMSDFGEN_DISABLE_PNG=ON

      - name: Build msdf-atlas-gen for WebGL
        shell: bash
        run: |
          source "$EMSDK_ROOT/emsdk_env.sh" >/dev/null
          cmake --build "$BUILD_DIR" --config Release --parallel
          cmake --install "$BUILD_DIR" --config Release

      - name: Configure NowUI WebGL wrapper
        shell: bash
        run: |
          source "$EMSDK_ROOT/emsdk_env.sh" >/dev/null

          cmake \
            -S "$GITHUB_WORKSPACE/Assets/NowUI/Native/nowui-msdf" \
            -B "$NOWUI_MSDF_BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$NOWUI_MSDF_INSTALL_DIR" \
            -DCMAKE_PREFIX_PATH="$INSTALL_DIR;$VCPKG_ROOT/installed/wasm32-emscripten" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$EMSDK_ROOT/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
            -DVCPKG_TARGET_TRIPLET=wasm32-emscripten \
            -DNOWUI_MSDF_DISABLE_FILE_API=ON

      - name: Build NowUI WebGL wrapper
        shell: bash
        run: |
          source "$EMSDK_ROOT/emsdk_env.sh" >/dev/null
          cmake --build "$NOWUI_MSDF_BUILD_DIR" --config Release --parallel
          cmake --install "$NOWUI_MSDF_BUILD_DIR" --config Release

      - name: Package WebGL plugin libraries
        shell: bash
        run: |
          source "$EMSDK_ROOT/emsdk_env.sh" >/dev/null
          mkdir -p "$NOWUI_MSDF_PLUGIN_DIR"
          cp "$GITHUB_WORKSPACE/Assets/NowUI/Plugins.meta" "$GITHUB_WORKSPACE/artifacts/nowui-msdf-webgl/Assets/NowUI/Plugins.meta"
          cp "$GITHUB_WORKSPACE/Assets/NowUI/Plugins/WebGL.meta" "$GITHUB_WORKSPACE/artifacts/nowui-msdf-webgl/Assets/NowUI/Plugins/WebGL.meta"

          find "$NOWUI_MSDF_INSTALL_DIR/lib" "$INSTALL_DIR/lib" "$VCPKG_ROOT/installed/wasm32-emscripten/lib" \
            -maxdepth 1 -type f \( -name '*.a' -o -name '*.bc' \) \
            -exec cp {} "$NOWUI_MSDF_PLUGIN_DIR" \;

          mapfile -t archives < <(find "$NOWUI_MSDF_PLUGIN_DIR" -maxdepth 1 -type f -name '*.a' | sort)
          if [ "${#archives[@]}" -gt 0 ]; then
            emcc -r "${archives[@]}" -o "$NOWUI_MSDF_PLUGIN_DIR/nowui-msdf.bc"
          fi

      - name: Upload NowUI WebGL artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowui-msdf-webgl
          path: ${{ github.workspace }}/artifacts/nowui-msdf-webgl
